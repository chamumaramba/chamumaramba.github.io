title: GitHub Pages Website
description: Assignment 1 - Website created using Github pages and Jekyll
theme: jekyll-theme-hacker

header_pages:
  - index.html
  - about.html
  - projects.html
  - contact.html
  - blog.html

# Define universal defaults
defaults:
  - scope:
      path: ""         
      type: "pages"     
    values:
      layout: "default"
