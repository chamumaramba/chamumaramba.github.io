<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} - {{ site.title }}</title>
    
    <!-- This links the theme's CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    
  </head>
  <body>

    <!-- Slate Header Structure -->
    <div id="header_wrap" class="outer">
        <header class="inner">
          <h1 id="project_title">{{ site.title }}</h1>
          <h2 id="project_tagline">{{ site.description }}</h2>

          <!-- Custom Navigation -->
          <nav>
            <a href="{{ '/' }}">Home</a> |
            <a href="{{ '/about.html' }}">About</a> |
            <a href="{{ '/projects.html' }}">Projects</a> |
            <a href="{{ '/contact.html' }}">Contact</a> |
            <a href="{{ '/blog.html' }}">Blog</a>
          </nav>
        </header>
    </div>

    <!-- Slate Main Content Structure -->
    <div id="main_content_wrap" class="outer">
      <section id="main_content" class="inner">
        {{ content }}
      </section>
    </div>

    <!-- Slate Footer Structure -->
    <div id="footer_wrap" class="outer">
      <footer class="inner">
        <p>&copy; 2026 Trust Maramba. All rights reserved.</p>
        <p>Contact: <a href="mailto:77936@office.mans.org.pl">77936@office.mans.org.pl</a></p>
        <p>Follow me: <a href="https://github.com/chamumaramba/chamumaramba.github.io.git">GitHub</a></p>
        <span class="site-footer-credits text-white">This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
      </footer>
    </div>

  </body>
</html>
