<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Reveal.js: Internet Technologies Module</title>

    <link rel="stylesheet" href="dist/reset.css">
    <link rel="stylesheet" href="dist/reveal.css">
    <!-- Using the 'moon' theme for a premium look -->
    <link rel="stylesheet" href="dist/theme/moon.css">

    <!-- Theme used for syntax highlighting of code -->
    <link rel="stylesheet" href="dist/plugin/highlight/monokai.css">
    
    <style>
      .reveal h1, .reveal h2, .reveal h3 {
        text-transform: none;
      }
      .reveal .slides section img {
        border: none;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Slide 1: Title -->
        <section data-markdown>
          <textarea data-template>
            # Reveal.js
            ### The HTML Presentation Framework
            
            **Module:** Internet Technologies  
            
            **Student:** Trust Maramba  
            
            **Degree:** Bachelor's Program
            
            ---
            
            ## 1. What is Reveal.js?
            Reveal.js is an open-source HTML presentation framework that enables anyone with a web browser to create beautiful, interactive presentations.
            
            - **Web Native:** Built with HTML, CSS, and JavaScript.
            - **Responsive:** Works on phones, tablets, and desktops.
            - **SEO Friendly:** Content is readable by search engines.
            
            ---
            
            ## 2. Core Capabilities
            The framework provides advanced features that traditional tools lack.
            
            --
            
            ### Multi-Dimensional Navigation
            Unlike linear presentations, Reveal.js supports both **horizontal** and **vertical** slide progression.
            
            --
            
            ### Markdown Support
            Write your content in plain text Markdown, making it easy to manage and version control.
            
            ---
            
            ## 3. Theming & Customization
            Reveal.js comes with a variety of built-in themes and allows for deep CSS customization.
            
            - **Built-in Themes:** Black, White, League, Moon, Solarized.
            - **Custom CSS:** Easily override styles for a unique brand identity.
            - **Transitions:** Choose from Slide, Fade, Convex, Concave, and Zoom.
            
            ---
            
            ## 4. Powerful Plugins
            The ecosystem includes plugins for specialized technical content.
            
            - **Syntax Highlighting:** Beautiful code blocks using Highlight.js.
            - **Speaker Notes:** A dedicated view for the presenter.
            - **MathJax:** Professional rendering of mathematical formulas.
            - **Auto-Animate:** Smooth transitions between similar code or elements.
            
            ---
            
            ## 5. Conclusion
            Reveal.js bridges the gap between web development and storytelling, providing a professional alternative for modern technical presentations.
            
            ### Thank You!
            [Sources & Documentation](https://revealjs.com)
          </textarea>
        </section>
      </div>
    </div>

    <script src="dist/reveal.js"></script>
    <script src="dist/plugin/notes.js"></script>
    <script src="dist/plugin/markdown.js"></script>
    <script src="dist/plugin/highlight.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ],
        // Vertical navigation configuration
        navigationMode: 'linear',
        controls: true,
        progress: true,
        center: true,
      });
    </script>
  </body>
</html>
